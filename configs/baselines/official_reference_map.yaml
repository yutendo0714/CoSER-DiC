mvp_reference_policy:
  design_decision: docs/research/design_decisions/003_official_implementation_reference_policy.md
  stage1_reference_audit: docs/research/design_decisions/004_stage1_semantic_vq_reference_audit.md
  rule: "CoSER-DiC stays a new codec; official repos are references, baselines, sanity checks, or limited initialization sources."
  default_reference_level:
    semantic_vq: L2_implementation_reference
    semantic_entropy: L2_implementation_reference
    detail_residual: L2_implementation_reference
    diffusion_decoder: L3_backbone_initialization_allowed
    baseline_reproduction: L0_baseline_only

references:
  rdvq:
    repo_path: external/repos/RDVQ
    remote: https://github.com/CVL-UESTC/RDVQ.git
    commit: a2744eedd803d9e20b55b4b0c935ec211a07d184
    license: MIT
    allowed_core_usage:
      - RD-aware VQ design reference
      - semantic token entropy model reference
      - top-k escape tensor-rANS implementation reference
      - actual bitstream evaluation reference
    forbidden_core_usage:
      - initialize default CoSER semantic VQ from RDVQ checkpoint during MVP-v0
      - present RDVQ tokenizer as CoSER semantic tokenizer
    key_files:
      - external/repos/RDVQ/tokenizer/tokenizer_image/models/quantizer.py
      - external/repos/RDVQ/tokenizer/tokenizer_image/training/losses/vq_loss.py
      - external/repos/RDVQ/tokenizer/tokenizer_image/codec/real/simple.py
      - external/repos/RDVQ/tokenizer/tokenizer_image/codec/real/causal_pipeline.py
      - external/repos/RDVQ/tokenizer/tokenizer_image/codec/entropy_coding/codecs/topk_tensor_rans.py
      - external/repos/RDVQ/tokenizer/tokenizer_image/codec/entropy_coding/probability.py
      - external/repos/RDVQ/tokenizer/tokenizer_image/codec/entropy_coding/symbol_mapping.py

  cod_lite:
    repo_path: external/repos/GenCodec
    subdir: CoD_Lite
    remote: https://github.com/microsoft/GenCodec.git
    commit: c49eb0d643cc75e6c732cbc311a508627b54cf06
    license: MIT
    allowed_core_usage:
      - initialize diffusion backbone from external/pretrained/CoD_Lite/CoD_Lite_pretrain.pt if compatible
      - one-step diffusion codec design reference
      - conditioning codec design reference
    forbidden_core_usage:
      - treat CoD-Lite bpp checkpoints as CoSER-DiC models
      - assume CoD-Lite condition codec natively represents CoSER semantic/detail streams
    key_files:
      - external/repos/GenCodec/CoD_Lite/finetuned_one_step_codec/models/models.py
      - external/repos/GenCodec/CoD_Lite/cod/diffusion/diffusion.py
      - external/repos/GenCodec/CoD_Lite/cod/models/condition_codec.py
      - external/repos/GenCodec/CoD_Lite/cod/models/pixel_dit.py

  glc:
    repo_path: external/repos/GLC
    remote: https://github.com/jzyustc/GLC.git
    commit: 126db25f9c093508cd0c99cee32b53fd60074f9a
    license: Apache-2.0
    allowed_core_usage:
      - VQ generative latent compression reference
      - hyperprior/spatial-prior residual coding reference
      - baseline reproduction
    forbidden_core_usage:
      - replace CoSER semantic/detail split with GLC latent codec
    key_files:
      - external/repos/GLC/src/models/image_model.py
      - external/repos/GLC/src/models/common_model.py
      - external/repos/GLC/src/models/vqgan_arch.py
      - external/repos/GLC/src/models/loss.py

  stablecodec:
    repo_path: external/repos/StableCodec
    remote: https://github.com/LuizScarlet/StableCodec.git
    commit: 73d9597cd97b8bca99c6c01a0156c37e6040e643
    license: MIT
    allowed_core_usage:
      - one-step diffusion codec baseline
      - fallback diffusion design reference
      - actual compress/decompress API reference
    forbidden_core_usage:
      - use as default CoSER diffusion backbone unless CoD-Lite path fails
    key_files:
      - external/repos/StableCodec/src/StableCodec.py
      - external/repos/StableCodec/src/compress.py
      - external/repos/StableCodec/ELIC/model/elic_official.py

  compressai:
    install_mode: pip
    package_path: .venv/lib/python3.10/site-packages/compressai
    allowed_core_usage:
      - entropy model implementation reference
      - pretrained RD anchor evaluation
      - actual compress/decompress bpp sanity check
    forbidden_core_usage:
      - report likelihood-estimated bpp as official CoSER bpp
    key_files:
      - .venv/lib/python3.10/site-packages/compressai/entropy_models/entropy_models.py
      - scripts/eval_compressai_anchor.py
