name: stablecodec
priority: A
repo_key: stablecodec
repo_path: external/repos/StableCodec
pretrained_dir: external/pretrained/StableCodec
usage_policy:
  core_integration_allowed: fallback_reference_only
  mvp_note: Baseline by default. Fallback decoder reference only if CoD-Lite integration fails.
evaluation:
  actual_bpp: verify
  protocols:
    - coser_common_lic
    - cod_reproduction_512
    - cod_lite_official_fullres
  datasets:
    coser_common_lic: [kodak, clic_professional_valid, div2k_val]
    cod_reproduction_512: [kodak, clic2020_test, div2k_val]
    cod_lite_official_fullres: [kodak, clic2020_test, div2k_val]
