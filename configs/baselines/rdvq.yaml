name: rdvq
priority: A
repo_key: rdvq
repo_path: external/repos/RDVQ
pretrained_dir: external/pretrained/RDVQ
usage_policy:
  core_integration_allowed: false
  mvp_note: CoSER semantic VQ must be scratch-trained. RDVQ checkpoints are baseline/sanity only.
evaluation:
  actual_bpp: prefer_official_compress_decompress
  protocols:
    - coser_common_lic
    - cod_reproduction_512
  datasets:
    coser_common_lic: [kodak, clic_professional_valid, div2k_val]
    cod_reproduction_512: [kodak, clic2020_test, div2k_val]
