experiment:
  name: coserdic_stage1_semantic_vq
  seed: 42
  scope: core_mvp_v0
  target_bpp: [0.01, 0.03, 0.05]

model:
  semantic_encoder:
    base_channels: 128
    output_channels: 256
    downsample_factor: 32
  vq:
    codebook_size: 8192
    embedding_dim: 256
    commitment_weight: 0.25
    # Core MVP Stage 1 starts with non-EMA codebook learning. Early probes showed
    # EMA updates collapsing to 2-3 active codes before the encoder/decoder pair
    # learned stable semantic structure; EMA can be re-enabled in a later
    # consolidation run from a healthy warmup checkpoint.
    ema_update: false
    temperature_init: 1.0
    temperature_final: 0.1
    # Current default is the least surprising Stage 1 baseline: hard straight-
    # through VQ in the native latent space. soft-ST and normalized cosine VQ
    # remain ablation options, but early 1k probes collapsed faster with them.
    usage_temperature: 1.0
    soft_st: false
    soft_st_temperature: 1.0
    normalize_latent: false
  semantic_aux_decoder:
    base_channels: 128
    num_res_blocks: 4

data:
  train_roots:
    - /dpl/race_pilot_openimages_crops
    - /dpl/race_pilot_div2k_crops_v3
  train_crop_size: 256
  pad_to_multiple: 64
  random_flip: true

optimization:
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  mixed_precision: true
  ema: true
  quantize_mix_warmup_steps: 0

loss:
  l1_sem: 1.0
  # pytorch-msssim produced non-finite gradients at Stage 1 initialization
  # even when the scalar loss was finite. Keep it as an evaluation metric until
  # a stable perceptual/SSIM surrogate is introduced.
  ms_ssim_sem: 0.0
  # LPIPS is useful as a perceptual metric/ablation, but it introduced
  # occasional non-finite gradients in hard-VQ Stage 1 probes. Keep the Core
  # MVP semantic tokenizer baseline L1-driven unless explicitly overridden.
  lpips_sem: 0.0
  vq: 1.0
  vq_commitment: 0.25
  codebook_usage: 0.05
  vq_warmup_steps: 0
  usage_warmup_steps: 0

logging:
  save_codebook_usage: true
  save_visual_samples: true
  wandb: true
