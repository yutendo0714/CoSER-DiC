experiment:
  name: coserdic_stage1_semantic_vq
  seed: 42

model:
  semantic_encoder:
    base_channels: 128
    output_channels: 256
    downsample_factor: 32
  vq:
    codebook_size: 8192
    embedding_dim: 256
    commitment_weight: 0.25
    ema_update: true
    temperature_init: 1.0
    temperature_final: 0.1
  semantic_aux_decoder:
    base_channels: 128
    num_res_blocks: 4

data:
  train_crop_size: 256
  pad_to_multiple: 64
  random_flip: true

optimization:
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  mixed_precision: true
  ema: true

loss:
  l1_sem: 1.0
  ms_ssim_sem: 0.2
  lpips_sem: 0.1
  vq_commitment: 0.25
  codebook_usage: 0.01

logging:
  save_codebook_usage: true
  save_visual_samples: true
