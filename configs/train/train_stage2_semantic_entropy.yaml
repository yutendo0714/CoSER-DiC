experiment:
  name: coserdic_stage2_semantic_entropy
  seed: 42
  scope: core_mvp_v0
  target_bpp: [0.01, 0.03, 0.05]

model:
  load_stage1_checkpoint: null
  semantic_entropy:
    active_codec: learned_topk_escape_huffman
    active_topk: 512
    decoder_schedule_topk: true
    active_token_prior_checkpoint: checkpoints/stage2_token_prior/20260627_stage2_token_prior_tf256_l4_8kstep_32768tokens_lr1e4_do02_es.pt
    active_prior: outputs/stage2_learned_entropy/20260627_stage2_learned_topk512_escape_huffman_fit_32768tokens_8kprior/learned_topk_escape_huffman_prior.json
    active_stream_header_codec: compact
    active_stream_checksum_codec: crc32
    active_codec_version_id: s2lte0
    kodak_payload_bpp: 0.010722
    kodak_full_stream_bpp: 0.021830
    kodak_fixed_bits_payload_bpp: 0.012695
    kodak_fixed_bits_full_stream_bpp: 0.023682
    previous_compact_crc32_longid_full_stream_bpp: 0.024760
    previous_compact_sha256_full_stream_bpp: 0.028178
    static_ablation_prior: outputs/stage2_semantic_entropy/20260627_stage2_leftctx_huffman_top64_b4096_4096calib_oi_div2k_from_stage1_best/static_left_context_huffman_prior.json
    hyperprior: true
    grouped_context: true
    full_autoregressive: false
    low_rank_logits: true
    cdf_precision: 16

optimization:
  optimizer: adamw
  lr_main: 5.0e-5
  lr_entropy: 5.0e-5
  mixed_precision: true

loss:
  rate_semantic: 1.0
  l1_sem: 1.0
  lpips_sem: 0.1
  vq_commitment: 0.25

sweep:
  rate_semantic: [0.25, 0.5, 1.0, 2.0, 4.0]

validation:
  report_estimated_bpp: true
  report_actual_bpp: true
  save_bitstreams: true
