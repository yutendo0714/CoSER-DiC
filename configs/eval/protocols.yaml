protocols:
  coser_common_lic:
    purpose: CoSER-DiC internal common LIC table.
    datasets:
      - key: kodak
        name: Kodak
        count: 24
      - key: clic_professional_valid
        name: CLIC Professional Validation
        count: 41
      - key: div2k_val
        name: DIV2K validation
        count: 100
        resolver: filename_indices_0801_0900
    metrics:
      primary:
        - PSNR
        - MS-SSIM
        - LPIPS
        - DISTS
      optional:
        - FID
        - KID
    bpp: actual_payload_bpp
    notes:
      - Do not mix this with CLIC2020 test 428 in one table without explicit labels.
      - Kodak FID is optional and should be labeled as low-sample or patch-based.

  coser_common_lic_plus_mobile:
    purpose: CoSER-DiC internal validation with mobile-domain coverage.
    datasets:
      - key: kodak
        name: Kodak
        count: 24
      - key: clic_professional_valid
        name: CLIC Professional Validation
        count: 41
      - key: clic_mobile_valid
        name: CLIC Mobile Validation
        count: 61
      - key: div2k_val
        name: DIV2K validation
        count: 100
        resolver: filename_indices_0801_0900
    metrics:
      primary:
        - PSNR
        - MS-SSIM
        - LPIPS
        - DISTS
      optional:
        - FID
        - KID
    bpp: actual_payload_bpp

  cod_reproduction_512:
    purpose: CoD paper-style 512x512 comparison table. This is the primary CoSER low-bitrate generative comparison protocol while the codec is crop-based.
    datasets:
      - key: kodak
        name: Kodak
        count: 24
      - key: clic2020_test
        name: CLIC2020 test
        count: 428
        components:
          - /dpl/clic/professional/test
          - /dpl/clic/mobile/test
      - key: div2k_val
        name: DIV2K validation
        count: 100
        resolver: filename_indices_0801_0900
    metrics:
      primary:
        - PSNR
        - LPIPS
        - DISTS
        - FID
      optional:
        - MS-SSIM
        - KID
    bpp:
      coserdic: actual_payload_bpp
      external_codec: label official nominal bpp, payload bpp, and codec file bpp separately
    preprocessing:
      all_datasets: resize if needed and center-crop to 512x512.
    fid:
      cod_paper_patch_fid:
        backend: label backend; official CoD uses torchmetrics FID in released scripts
        fid_patch_num: 2
        kodak: patch_size 64
        clic2020_test: patch_size 128
        div2k_val: report only with explicit patch size/backend label
    notes:
      - CLIC2020 test 428 is professional/test plus mobile/test, not CLIC Professional Validation 41.
      - DIV2K validation is filenames 0801.png through 0900.png when the local root is mixed.
      - Patch-based or overlapped-patch FID must be labeled in the table caption.

  gencodec_reproduction:
    purpose: Legacy alias for cod_reproduction_512 in old experiment commands. Prefer cod_reproduction_512 for new runs.
    alias_of: cod_reproduction_512

  cod_lite_official_fullres:
    purpose: CoD-Lite official-code comparison table. This is a separate table, not a drop-in replacement for cod_reproduction_512.
    runnable_by_current_crop_evaluators: false
    datasets:
      - key: kodak
        name: Kodak512 / center-cropped Kodak
        count: 24
      - key: clic2020_test
        name: CLIC2020 test
        count: 428
        preprocessing: full resolution
      - key: div2k_val
        name: DIV2K validation
        count: 100
        usage: appendix / additional results
    metrics:
      primary:
        - LPIPS
        - DISTS
        - FID
      optional:
        - PSNR
        - KID
    fid:
      cod_lite_readme_patch_fid:
        fid_patch_num: 2
        kodak512: patch_size 64
        other_datasets: patch_size 256
    notes:
      - CoSER needs a full-resolution padding/tiling evaluator before this protocol can be used as a main result.
      - Do not mix this full-resolution CLIC table with 512-crop CoD tables.
