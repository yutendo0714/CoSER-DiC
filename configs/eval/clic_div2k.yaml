datasets:
  clic_valid:
    path: /dpl/clic/professional/valid
    full_resolution: true
    protocol_key: clic_professional_valid
  div2k_val:
    path: /dpl/div2k
    filename_indices: 0801-0900
    full_resolution: true
    protocol_key: div2k_val

protocol:
  default: coser_common_lic
  config: configs/eval/protocols.yaml
  note: Use gencodec_reproduction for CLIC2020 test 428 comparisons; this config is the CoSER common LIC validation protocol.

evaluation:
  use_compress_decompress: true
  forward_only_debug: false
  pad_to_multiple: 64
  remove_padding_before_metric: true
  save_bitstreams: true
  save_reconstructions: true
  deterministic_decoder: true

metrics:
  actual_bpp: true
  estimated_bpp: true
  bpp_decomposition: true
  psnr_rgb: true
  psnr_y: true
  ms_ssim_rgb: true
  lpips_alex: true
  dists: true
  fid: true
  kid: true
  dino_similarity: optional
  clip_similarity: optional
  runtime: true

report:
  output_dir: results/eval/clic_div2k
